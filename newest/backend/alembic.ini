# Alembic database migration configuration.

[alembic]
# Migration script directory.
script_location = alembic

# Migration file name template.
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Add the backend directory to sys.path.
prepend_sys_path = .

# timezone =

# truncate_slug_length = 40
# revision_environment = false
# sourceless = false
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

version_path_separator = os

# recursive_version_locations = false
# output_encoding = utf-8

# Database connection.
sqlalchemy.url = postgresql://rsod_admin:rsod_admin@localhost:5432/rsod_agent


[post_write_hooks]
# Format generated migration files with black.
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# Lint generated migration files with ruff.
# hooks = ruff
# ruff.type = exec
# ruff.executable = %(here)s/.venv/bin/ruff
# ruff.options = --fix REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
