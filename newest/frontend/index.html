<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#03101d" />
  <meta name="description" content="集成雨雾交通检测、YOLOv11 智能体、电影式开场动画与 1–9 手势交互的 FogTraffic 平台。" />
  <title>FogTraffic Gesture Vision</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop stop-color='%2322d3ee'/%3E%3Cstop offset='1' stop-color='%236366f1'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='16' fill='%23030b16'/%3E%3Cpath d='M32 8 52 19.5v25L32 56 12 44.5v-25L32 8Z' fill='url(%23g)'/%3E%3Ccircle cx='32' cy='32' r='8' fill='white'/%3E%3Cpath d='M10 33h12M42 33h12' stroke='%23a5f3fc' stroke-width='3' stroke-linecap='round'/%3E%3C/svg%3E" />
</head>
<body class="cinematic-intro-active">
  <div id="cinematic-loader" class="cinematic-loader" role="status" aria-live="polite" aria-label="FogTraffic 正在载入">
    <div class="cinematic-loader-paper">
      <div class="loader-mark" aria-hidden="true">
        <i class="loader-face loader-face--left"></i>
        <i class="loader-face loader-face--right"></i>
        <i class="loader-face loader-face--top"></i>
      </div>
      <div class="loader-wordmark"><strong>FogTraffic</strong><span>INTELLIGENT VISION SYSTEM</span></div>
      <div class="loader-progress"><b id="loader-progress-value">000</b><i></i><span>LOADING</span></div>
    </div>
    <div class="loader-curtain" aria-hidden="true"><span>VISION · RESILIENT · INTELLIGENT</span></div>
  </div>

  <div id="app" aria-live="polite"></div>
  <div id="modal-root"></div>

  <section id="gesture-experience" class="gesture-experience" aria-label="全局手势控制">
    <canvas id="gesture-stage" aria-hidden="true"></canvas>
    <video id="gesture-camera" playsinline muted aria-label="手势识别摄像头预览"></video>

    <div class="gesture-status" id="gesture-status-card" aria-live="polite">
      <span class="gesture-status-dot"></span>
      <div><small id="gesture-system-status">手势控制未启动</small><strong id="gesture-current">鼠标 / 触控模式</strong></div>
      <i class="gesture-confidence"><b id="gesture-confidence-fill"></b></i>
    </div>

    <div class="gesture-route-map" id="gesture-route-map" aria-label="数字手势导航映射">
      <span><b>1</b>对话</span><span><b>2</b>检测</span><span><b>3</b>数据集</span>
      <span><b>4</b>训练</span><span><b>5</b>评估</span><span><b>6</b>看板</span>
      <span><b>7</b>历史</span><span><b>8</b>用户</span><span><b>9</b>设置</span>
      <small>6–9 使用双手手指数相加</small>
    </div>

    <div class="gesture-interaction-tip" id="gesture-interaction-tip"><i></i><span>食指移动 · 捏合点击 · 握拳取消 · 数字 1–9 跳转</span></div>

    <div class="gesture-mini-toolbar" aria-label="手势控制工具栏">
      <button id="gesture-control-toggle" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7.5A2.5 2.5 0 0 1 6.5 5h7A2.5 2.5 0 0 1 16 7.5v9A2.5 2.5 0 0 1 13.5 19h-7A2.5 2.5 0 0 1 4 16.5v-9Z"/><path d="m16 10 4-2v8l-4-2"/></svg>
        <span class="gesture-toolbar-label">启动手势</span>
      </button>
      <button id="gesture-preview-toggle" type="button" disabled>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6Z"/><circle cx="12" cy="12" r="2.5"/></svg>
        <span class="gesture-toolbar-label">显示预览</span>
      </button>
      <button id="gesture-mirror-toggle" type="button" disabled>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 7 3 12l5 5M16 7l5 5-5 5M3 12h18"/></svg>
        <span class="gesture-toolbar-label">镜像方向</span>
      </button>
      <button id="gesture-particles-toggle" type="button" disabled>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M18.4 5.6l-2.1 2.1M7.7 16.3l-2.1 2.1"/><circle cx="12" cy="12" r="3.25"/></svg>
        <span class="gesture-toolbar-label">粒子：轻量</span>
      </button>
    </div>

    <div id="gesture-cursor" class="gesture-cursor" aria-hidden="true"><i></i><b></b></div>
    <div id="gesture-route-flash" class="gesture-route-flash" aria-live="polite"></div>
    <div id="gesture-error" class="gesture-error" hidden></div>
  </section>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
